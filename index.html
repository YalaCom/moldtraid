<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ФитДеньгиМММ Мобайл</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #0b0e14;
            color: #e2e8f0;
            -webkit-tap-highlight-color: transparent;
        }
        .glow-green { text-shadow: 0 0 12px rgba(34, 197, 94, 0.8); }
        .glow-red { text-shadow: 0 0 12px rgba(239, 68, 68, 0.8); }
        .glass {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-3 select-none text-sm overflow-x-hidden">

    <!-- ОКНО РЕГИСТРАЦИИ -->
    <div id="authModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-md p-4">
        <div class="glass p-6 rounded-2xl w-full max-w-sm shadow-2xl border border-yellow-500/30 text-center">
            <div class="text-4xl mb-2">🔥</div>
            <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-600 mb-1">
                ФитДеньгиМММ
            </h1>
            <p class="text-xs text-gray-400 mb-5">Терминал хаотичного трейдинга</p>
            
            <form id="authForm" class="space-y-4">
                <div>
                    <input type="text" id="username" placeholder="Ваш ник (Азартный Трейдер)" required 
                        class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-yellow-500 text-white">
                </div>
                <div class="p-3 bg-yellow-500/10 border border-yellow-500/20 rounded-xl text-yellow-400 text-xs text-left">
                    🎁 На старте вы получаете ровно <b>500 ₽</b>!
                </div>
                <button type="submit" 
                    class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 active:from-yellow-600 active:to-amber-700 text-black font-bold py-3.5 rounded-xl transition shadow-lg shadow-yellow-500/20 text-base">
                    Войти на биржу
                </button>
            </form>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div class="w-full max-w-md mx-auto flex flex-col flex-grow justify-between space-y-3 hidden" id="mainApp">
        
        <!-- ХЕДЕР -->
        <header class="glass rounded-xl p-3 flex items-center justify-between shadow-lg">
            <div class="flex items-center space-x-2">
                <span class="text-2xl animate-pulse">💸</span>
                <div>
                    <h1 class="text-sm font-black text-yellow-400 tracking-wide">ФИТ-ДЕНЬГИ</h1>
                    <div class="flex items-center space-x-1.5">
                        <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-ping" id="statusDot"></span>
                        <span class="text-[10px] text-gray-400 font-bold uppercase" id="marketStatus">Рынок: Норма</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center space-x-3">
                <div class="text-right">
                    <div class="text-[10px] text-gray-400">FIT/RUB:</div>
                    <div id="currentPrice" class="text-base font-bold text-green-400 transition-all duration-100">
                        750.00 ₽
                    </div>
                </div>
            </div>
        </header>

        <!-- БАЛАНС И КНОПКА ХАЛЯВЫ -->
        <div class="glass rounded-xl p-3 flex items-center justify-between border-l-4 border-yellow-500 shadow-md">
            <div>
                <div class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Ваш капитал:</div>
                <div id="userBalance" class="text-2xl font-black text-yellow-400 tracking-tight">500.00 ₽</div>
            </div>
            
            <button id="freeMoneyBtn" onclick="getFreeMoney()" 
                class="hidden bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-extrabold px-3 py-2 rounded-xl text-xs shadow-md shadow-cyan-500/20 active:scale-95 transition-transform animate-bounce">
                +100 ₽ Халява!
            </button>
        </div>

        <!-- ГРАФИК -->
        <div class="glass rounded-xl p-3 flex flex-col justify-between relative shadow-inner">
            <div class="w-full h-[220px] relative">
                <canvas id="marketChart"></canvas>
            </div>
        </div>

        <!-- УПРАВЛЕНИЕ СДЕЛКОЙ -->
        <div class="glass rounded-xl p-3.5 space-y-3 shadow-lg">
            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="text-xs text-gray-400 font-medium">Сумма инвестиции:</label>
                </div>
                <div class="grid grid-cols-5 gap-2">
                    <input type="number" id="betAmount" value="50" min="1" 
                        class="col-span-2 bg-gray-900 border border-gray-700 rounded-lg px-2 py-1.5 text-yellow-400 font-bold text-center focus:outline-none focus:border-yellow-500 text-sm">
                    <button onclick="setBet(50)" class="bg-gray-800 active:bg-gray-600 rounded-lg text-xs font-bold py-1.5">50</button>
                    <button onclick="setBet(100)" class="bg-gray-800 active:bg-gray-600 rounded-lg text-xs font-bold py-1.5">100</button>
                    <button onclick="setMaxBet()" class="bg-yellow-500/10 text-yellow-400 border border-yellow-500/30 active:bg-yellow-500/20 rounded-lg text-xs font-bold py-1.5">MAX</button>
                </div>
            </div>

            <div class="flex items-center justify-between bg-gray-900/40 p-2 rounded-lg border border-gray-800">
                <label class="text-xs text-gray-400">Время ожидания:</label>
                <select id="tradeDuration" class="bg-gray-900 border border-gray-700 rounded-md px-2 py-1 text-xs text-white focus:outline-none">
                    <option value="10">10 сек</option>
                    <option value="30">30 сек</option>
                    <option value="60" selected>1 мин</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-1">
                <button onclick="openTrade('LONG')" 
                    class="bg-emerald-600 active:bg-emerald-700 text-white font-black py-3 rounded-xl shadow-lg flex flex-col items-center justify-center active:scale-95 transition-transform">
                    <span class="text-[10px] uppercase opacity-80">ВЫРАСТЕТ</span>
                    <span class="text-sm">📈 LONG</span>
                </button>
                
                <button onclick="openTrade('SHORT')" 
                    class="bg-rose-600 active:bg-rose-700 text-white font-black py-3 rounded-xl shadow-lg flex flex-col items-center justify-center active:scale-95 transition-transform">
                    <span class="text-[10px] uppercase opacity-80">УПАДЁТ</span>
                    <span class="text-sm">📉 ПОСМОЛИТЬ</span>
                </button>
            </div>
        </div>

        <!-- ТАБЛИЦА СДЕЛОК -->
        <div class="glass rounded-xl p-3 flex-grow flex flex-col overflow-hidden max-h-[160px] shadow-lg">
            <div class="flex justify-between items-center mb-1.5 border-b border-gray-800 pb-1">
                <span class="text-xs font-bold uppercase text-gray-400">Активные ордера</span>
                <span id="activeTradesCount" class="text-[10px] bg-yellow-500/20 text-yellow-400 px-2 py-0.5 rounded-full font-bold">0</span>
            </div>
            <div class="overflow-y-auto no-scrollbar flex-grow text-[11px]">
                <div id="tradesContainer" class="space-y-1.5">
                    <div class="text-center py-6 text-gray-500 italic">Нет открытых позиций</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ЛОГИКА -->
    <script>
        // --- 1. АУДИО ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) audioCtx = new AudioContext();
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration) {
            try {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }
        function soundWin() { playTone(587.33, 'sine', 0.15); setTimeout(() => playTone(880, 'sine', 0.3), 100); }
        function soundLose() { playTone(220, 'sawtooth', 0.4); }
        function soundClick() { playTone(440, 'triangle', 0.05); }

        // --- 2. ПЕРЕМЕННЫЕ ---
        let balance = 500.00;
        let currentPrice = 750.00; 
        let priceHistory = Array(25).fill(750.00);
        let timeLabels = Array(25).fill('');
        let activeTrades = [];
        let tradeIdCounter = 1;
        let marketMode = 'NORMAL'; 
        let modeTicksLeft = 0;
        let chart = null; // График инициализируется позже

        // --- 3. ИНИЦИАЛИЗАЦИЯ ГРАФИКА ---
        function initChart() {
            if (chart !== null) return; // Чтобы не создавать дважды
            const ctx = document.getElementById('marketChart').getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 180);
            gradient.addColorStop(0, 'rgba(234, 179, 8, 0.2)');
            gradient.addColorStop(1, 'rgba(234, 179, 8, 0.0)');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: timeLabels,
                    datasets: [{
                        data: priceHistory,
                        borderColor: '#eab308',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 150 },
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { grid: { color: 'rgba(255, 255, 255, 0.04)' }, ticks: { color: '#6b7280' } }
                    }
                }
            });
        }

        // --- 4. СОХРАНЕНИЕ И ЗАГРУЗКА ---
        function saveBalance() {
            localStorage.setItem('mm_balance', balance.toFixed(2));
        }

        function loadState() {
            const savedBalance = localStorage.getItem('mm_balance');
            const savedUser = localStorage.getItem('mm_user');
            
            if (savedBalance !== null && !isNaN(savedBalance) && parseFloat(savedBalance) > 0) {
                balance = parseFloat(savedBalance);
            } else {
                balance = 500.00; 
            }
            
            if (savedUser) {
                document.getElementById('authModal').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                initChart(); // Запускаем график ТОЛЬКО после открытия интерфейса
                startMarket(); 
            }
            
            updateBalanceDisplay();
        }

        // --- 5. АВТОРИЗАЦИЯ ---
        document.getElementById('authForm').addEventListener('submit', (e) => {
            e.preventDefault();
            initAudio(); 
            const user = document.getElementById('username').value;
            if (user.trim()) {
                localStorage.setItem('mm_user', user.trim());
                balance = 500.00; 
                saveBalance();
                updateBalanceDisplay();
                
                document.getElementById('authModal').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                
                initChart(); // Запускаем график
                soundWin();
                startMarket();
            }
        });

        // --- 6. ДВИЖОК РЫНКА ---
        let marketInterval;
        function startMarket() {
            if (marketInterval) clearInterval(marketInterval);
            marketInterval = setInterval(() => {
                
                // Переключение режимов
                if (modeTicksLeft <= 0) {
                    const rand = Math.random();
                    if (marketMode === 'MEGA_PUMP') {
                        marketMode = 'CRASH'; // После мега-пампа всегда обвал
                        modeTicksLeft = Math.floor(Math.random() * 8) + 5;
                    } else if (marketMode === 'PUMP') {
                        marketMode = 'HOLD_HIGH'; // После пампа цена висит наверху
                        modeTicksLeft = Math.floor(Math.random() * 15) + 10;
                    } else {
                        if (rand < 0.03) { marketMode = 'MEGA_PUMP'; modeTicksLeft = Math.floor(Math.random() * 8) + 5; } // Улёт до 10к
                        else if (rand < 0.15) { marketMode = 'PUMP'; modeTicksLeft = Math.floor(Math.random() * 6) + 4; } 
                        else if (rand < 0.30) { marketMode = 'CRASH'; modeTicksLeft = Math.floor(Math.random() * 8) + 5; } 
                        else { marketMode = 'NORMAL'; modeTicksLeft = Math.floor(Math.random() * 25) + 15; }
                    }
                } else {
                    modeTicksLeft--;
                }

                let volatility = 0.012; 
                let bias = 0; 
                const statusEl = document.getElementById('marketStatus');
                const dot = document.getElementById('statusDot');

                // СКРЫТАЯ МЕХАНИКА СЛИВА
                if (activeTrades.length > 0) {
                    let longVol = 0, shortVol = 0;
                    activeTrades.forEach(t => {
                        if (t.type === 'LONG') longVol += t.amount;
                        else shortVol += t.amount;
                    });
                    
                    if (longVol > shortVol) bias = -0.015; // Давим лонгистов
                    else if (shortVol > longVol) bias = 0.015; // Давим шортистов
                }

                // Логика поведения графика
                if (marketMode === 'CRASH') {
                    volatility = 0.05; bias += -0.15; 
                    statusEl.innerText = 'ОБВАЛ 📉'; statusEl.className = 'text-[10px] text-red-500 font-bold uppercase animate-pulse';
                    dot.className = 'inline-block w-2 h-2 rounded-full bg-red-500 animate-ping';
                } else if (marketMode === 'PUMP') {
                    volatility = 0.05; bias += 0.15; 
                    statusEl.innerText = 'ПАМП 🚀'; statusEl.className = 'text-[10px] text-emerald-400 font-bold uppercase animate-pulse';
                    dot.className = 'inline-block w-2 h-2 rounded-full bg-emerald-500 animate-ping';
                } else if (marketMode === 'HOLD_HIGH') {
                    volatility = 0.005; 
                    if (currentPrice < 1200) bias += 0.05; 
                    statusEl.innerText = 'ФЛЭТ НАВЕРХУ 📊'; statusEl.className = 'text-[10px] text-yellow-400 font-bold uppercase';
                    dot.className = 'inline-block w-2 h-2 rounded-full bg-yellow-400 animate-ping';
                } else if (marketMode === 'MEGA_PUMP') {
                    volatility = 0.1; bias += 0.5; // Экстремальный рост
                    statusEl.innerText = 'ТУЗЕМУН 🌕'; statusEl.className = 'text-[10px] text-purple-400 font-bold uppercase animate-pulse';
                    dot.className = 'inline-block w-2 h-2 rounded-full bg-purple-500 animate-ping';
                } else {
                    statusEl.innerText = 'НОРМА'; statusEl.className = 'text-[10px] text-gray-400 font-bold uppercase';
                    dot.className = 'inline-block w-2 h-2 rounded-full bg-gray-400 animate-ping';
                    
                    // Удержание в рамках 150-1400
                    if (currentPrice > 1400) bias -= 0.03;
                    if (currentPrice < 150) bias += 0.03;
                }

                const randomFactor = (Math.random() - 0.5) * 2 + bias;
                currentPrice = currentPrice * (1 + randomFactor * volatility);
                
                if (currentPrice < 5) currentPrice = 5;
                if (marketMode !== 'MEGA_PUMP' && currentPrice > 1500) {
                    currentPrice = 1480 + (Math.random() * 20);
                }
                
                priceHistory.push(currentPrice); priceHistory.shift();
                timeLabels.push(''); timeLabels.shift();

                const priceEl = document.getElementById('currentPrice');
                const prevPrice = priceHistory[priceHistory.length - 2];
                priceEl.innerText = `${currentPrice.toFixed(2)} ₽`;
                
                if (chart) {
                    if (currentPrice >= prevPrice) {
                        priceEl.className = 'text-lg font-bold text-emerald-400 glow-green';
                        chart.data.datasets[0].borderColor = '#10b981';
                    } else {
                        priceEl.className = 'text-lg font-bold text-rose-500 glow-red';
                        chart.data.datasets[0].borderColor = '#f43f5e';
                    }
                    chart.update();
                }

                updateActiveTrades();
            }, 700);
        }

        // --- 7. ВЗАИМОДЕЙСТВИЕ ---
        function setBet(val) { initAudio(); soundClick(); document.getElementById('betAmount').value = val; }
        function setMaxBet() { initAudio(); soundClick(); document.getElementById('betAmount').value = Math.max(1, Math.floor(balance)); }

        function updateBalanceDisplay() {
            document.getElementById('userBalance').innerText = `${balance.toFixed(2)} ₽`;
            const freeBtn = document.getElementById('freeMoneyBtn');
            
            // Кнопка халявы только если денег мало и нет активных сделок
            if (balance < 100 && activeTrades.length === 0) {
                freeBtn.classList.remove('hidden');
            } else {
                freeBtn.classList.add('hidden');
            }
        }

        function getFreeMoney() {
            initAudio();
            if (balance < 100 && activeTrades.length === 0) {
                balance += 100;
                saveBalance();
                updateBalanceDisplay();
                soundWin();
            }
        }

        function openTrade(type) {
            initAudio();
            const amount = parseFloat(document.getElementById('betAmount').value);
            const duration = parseInt(document.getElementById('tradeDuration').value);

            if (isNaN(amount) || amount <= 0 || amount > balance) {
                soundLose();
                return;
            }

            soundClick();
            balance -= amount;
            saveBalance();
            
            activeTrades.push({
                id: tradeIdCounter++,
                type: type,
                amount: amount,
                entryPrice: currentPrice,
                duration: duration,
                timeLeft: duration
            });
            
            updateBalanceDisplay(); 
            renderTradesList();
        }

        function getPayout(trade) {
            const diff = (currentPrice - trade.entryPrice) / trade.entryPrice;
            const leverage = 12; 
            let pnl = (trade.type === 'LONG' ? diff : -diff) * leverage * trade.amount;
            if (pnl < -trade.amount) pnl = -trade.amount; 
            return pnl;
        }

        function updateActiveTrades() {
            if (activeTrades.length === 0) return;
            const expiredTrades = [];

            activeTrades.forEach(trade => {
                trade.timeLeft -= 0.7; 
                if (trade.timeLeft <= 0) expiredTrades.push(trade);
            });

            expiredTrades.forEach(trade => {
                const pnl = getPayout(trade);
                const finalPayout = trade.amount + pnl;
                if (finalPayout > 0) balance += finalPayout;
                
                if (pnl > 0) soundWin(); else soundLose();
                
                saveBalance();
                activeTrades = activeTrades.filter(t => t.id !== trade.id);
            });

            updateBalanceDisplay();
            renderTradesList();
        }

        function renderTradesList() {
            const container = document.getElementById('tradesContainer');
            document.getElementById('activeTradesCount').innerText = activeTrades.length;

            if (activeTrades.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-gray-500 italic">Нет открытых позиций</div>`;
                return;
            }

            container.innerHTML = activeTrades.map(trade => {
                const pnl = getPayout(trade);
                const isProfit = pnl >= 0;
                const pnlClass = isProfit ? 'text-emerald-400 font-bold glow-green' : 'text-rose-500 font-bold glow-red';
                const typeText = trade.type === 'SHORT' ? 'ПОСМОЛИТЬ' : 'LONG';
                const typeColor = trade.type === 'SHORT' ? 'text-rose-400' : 'text-emerald-400';

                return `
                    <div class="bg-gray-900/90 border border-gray-800 rounded-xl p-2 flex items-center justify-between">
                        <div class="flex flex-col">
                            <div class="flex items-center space-x-1.5">
                                <span class="font-extrabold ${typeColor}">${typeText}</span>
                                <span class="text-gray-500 text-[9px]">вход: ${trade.entryPrice.toFixed(1)}</span>
                            </div>
                            <div class="text-[10px] text-gray-400">
                                Ставка: <b class="text-yellow-400">${trade.amount}₽</b> | Ост. <b>${Math.max(0, Math.ceil(trade.timeLeft))}с</b>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="${pnlClass}">${isProfit ? '+' : ''}${pnl.toFixed(2)} ₽</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- ЗАПУСК ПРИ ЗАГРУЗКЕ ---
        window.onload = loadState;
    </script>
</body>
</html>
